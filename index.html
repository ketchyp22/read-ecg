<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ЭКГ Квиз — Угадай ритм</title>
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="8944419-hd_1920_1080_25fps.mp4" type="video/mp4">
</video>
<div id="bg-overlay"></div>

<div id="app">

  <!-- СТАРТ -->
  <div id="screen-start" class="screen">
    <div class="glass-card start-card">
      <div class="logo-icon">🫀</div>
      <h1 class="app-title">
        ЭКГ Квиз
        <span>Угадай ритм</span>
      </h1>
      <p class="app-subtitle">
        На экране — реальная ЭКГ и клиническая ситуация.<br>
        Поставь правильный диагноз.
      </p>

      <button class="btn btn-primary" id="btn-start">Начать</button>
    </div>
  </div>

  <!-- ИГРА -->
  <div id="screen-game" class="screen">
    <div class="glass-card game-card">

      <div class="game-header">
        <div class="game-progress-info">
          Задача <span id="progress-current">1</span> / <span id="progress-total">5</span>
        </div>
        <div class="score-live" id="score-live">Счёт: <span>0</span></div>
      </div>

      <div class="scenario-card">
        <div class="task-label">🩺 Клиническая ситуация</div>
        <p class="task-title" id="task-title"></p>
        <div class="ecg-wrapper">
          <div id="ecg-container"></div>
        </div>
      </div>

      <div class="options-grid" id="options-container"></div>

      <div class="explanation-box" id="explanation-box">
        <p id="explanation-text"></p>
      </div>

      <div class="game-footer">
        <button class="btn btn-ghost" id="btn-skip">Пропустить →</button>
        <button class="btn btn-secondary" id="btn-next" style="display:none;">Далее →</button>
      </div>

    </div>
  </div>

  <!-- РЕЗУЛЬТАТ -->
  <div id="screen-result" class="screen">
    <div class="glass-card result-card">
      <div class="result-icon" id="result-icon">🏆</div>
      <h2 class="result-title" id="result-title">Результат</h2>
      <div class="result-score-block">
        <div class="result-score-number" id="result-score">0</div>
        <div class="result-score-label">очков</div>
      </div>
      <div class="result-stats">
        <div class="result-stat">
          <span class="result-stat-value correct" id="result-correct">0</span>
          <span class="result-stat-label">Верно</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-value wrong" id="result-wrong">0</span>
          <span class="result-stat-label">Неверно</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-value skipped" id="result-skipped">0</span>
          <span class="result-stat-label">Пропущено</span>
        </div>
      </div>
      <p class="result-grade" id="result-grade"></p>
      <div class="result-buttons">
        <button class="btn btn-primary" id="btn-play-again">Ещё раз</button>
        <button class="btn btn-secondary" id="btn-to-menu">В меню</button>
      </div>
    </div>
  </div>

</div>

<script src="questions.js"></script>
<script src="app.js"></script>
<script>
  if (typeof vkBridge !== 'undefined') vkBridge.send('VKWebAppInit');
</script>
</body>
</html>
